# Alat ops: menjalankan scripts/seed-demo.mjs terhadap deployment produksi.
# Dipicu dengan push ke branch ops/seed-demo-run (integrasi GitHub yang dipakai
# tidak punya izin workflow_dispatch). Runner GitHub dipakai karena punya akses
# internet langsung ke *.workers.dev.
#
# Mode SEED_REGISTER: TANPA rahasia apa pun — skrip mendaftarkan akun seeder
# dengan kredensial acak yang dibuat di runner dan tidak pernah dicetak/keluar.
# Setelah run sukses, operator memindahkan kepemilikan perusahaan demo ke akun
# tujuan lewat control-plane lalu menonaktifkan akun seeder.
name: Seed demo

on:
  push:
    branches: [ops/seed-demo-run]

jobs:
  seed:
    name: Seed PT Demo Sejahtera
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://erpindo.nurudhuhaalamin.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cek kesehatan API
        run: curl -sf --max-time 20 "$BASE_URL/api/health"

      - name: Jalankan seed demo (akun seeder acak)
        env:
          SEED_REGISTER: "1"
        run: node scripts/seed-demo.mjs

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, test, build & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Syntax check ops scripts
        run: node --check scripts/seed-demo.mjs && node --check scripts/ai-probe.mjs

      - name: Build
        run: pnpm build

      - name: End-to-end smoke test (wrangler dev, local D1)
        run: pnpm smoke

  ui-sim:
    # Simulasi UI penuh (Fase 9b): klik-tembus browser nyata — sapu semua rute
    # + alur interaktif. Dipromosikan WAJIB pada Fase 9d setelah stabil
    # berturut-turut di CI.
    name: UI simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: npx playwright-core install chromium

      - name: UI simulation (wrangler dev + Playwright)
        run: node scripts/ui-sim.mjs

  lint:
    # Dipromosikan WAJIB pada Fase 12a setelah migrasi ke flat config (ESLint 9)
    # dan basis kode terbukti bersih.
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint
        run: pnpm lint


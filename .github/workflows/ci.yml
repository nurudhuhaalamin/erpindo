name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck, test, build & smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: End-to-end smoke test (wrangler dev, local D1)
        run: pnpm smoke

  deploy:
    name: Deploy to Cloudflare
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Cloudflare credentials
        id: creds
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN secret is not set; skipping deploy." >> "$GITHUB_STEP_SUMMARY"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.creds.outputs.available == 'true'

      - uses: actions/setup-node@v4
        if: steps.creds.outputs.available == 'true'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.creds.outputs.available == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.creds.outputs.available == 'true'
        run: pnpm build

      - name: Deploy Worker
        if: steps.creds.outputs.available == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter @erpindo/api exec wrangler deploy
